<div class="add-to-cart-button__container">
  @if (counter > 0) {
    <button
      class="add-to-cart-button__decrease-button"
      (click)="decreaseCounter()"
    >
      -
    </button>
    <div class="add-to-cart-button__counter">{{ counter }}</div>
    <button
      class="add-to-cart-button__increase-button"
      (click)="increaseCounter()"
    >
      +
    </button>
  } @else {
    <button
      class="add-to-cart-button"
      [disabled]="disabled"
      (click)="increaseCounter()"
    >
      Add to cart
    </button>
  }
</div>
